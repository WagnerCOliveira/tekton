# Valores default — refletem o estado atual (yaml/ci/rbac.yaml, yaml/ci/pipelines/*.yaml,
# yaml/ci/triggers/*.yaml, scripts/setup/04-bootstrap-ci.sh). Épico 2 (RBAC e Secrets,
# Sprint 3) e Épico 4 (Pipelines/Triggers/EventListener, Sprint 5) — ver docs/roadmap-helm.md.

namespace: ci

serviceAccount:
  name: tekton-triggers-sa

# ClusterRoles referenciados aqui são criados pela instalação do Tekton Triggers
# (fora do escopo deste chart — ver ADR-01 em docs/roadmap-helm.md).
rbac:
  roleBindingName: tekton-triggers-eventlistener-binding
  eventListenerClusterRole: tekton-triggers-eventlistener-roles
  clusterRoleBindingName: tekton-triggers-sa-cluster
  eventListenerClusterRoleCluster: tekton-triggers-eventlistener-clusterroles
  createPipelineRunClusterRole: tekton-triggers-create-pipelinerun
  createPipelineRunClusterRoleBinding: tekton-triggers-sa-create-pipelinerun

webhook:
  secretName: gitlab-webhook-secret
  # token: ""   # opcional — se omitido, gera automaticamente (randAlphaNum 40)
                 # e preserva o valor existente em upgrades (via lookup)

clusterResolver:
  namespace: tekton-pipelines-resolvers
  configMapName: cluster-resolver-config
  defaultNamespace: "ci"
  allowedNamespaces: "ci"

featureFlags:
  namespace: tekton-pipelines
  configMapName: feature-flags
  enableBundlesResolver: true
  enableClusterResolver: true
  hook:
    image: bitnami/kubectl:1.29
    # HLM-31 — Job de um único `kubectl patch`, roda e termina.
    resources:
      requests:
        cpu: 20m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

# Épico 4 (Sprint 5): Pipelines por stack, Triggers e EventListener.
platform:
  # Repositório onde os Task Bundles usados pelos Pipelines estão publicados.
  # Precisa bater com charts/tekton-bundles (registry.host + registry.repository e
  # as tags de cada bundle) — sem amarração automática entre os dois charts até o
  # Helmfile do Épico 5 (HLM-24).
  taskBundleRegistry: registry.registry.svc.cluster.local:5000/tekton
  gitCloneTag: v1
  kanikoTag: v1

  # Registry onde as imagens de aplicação (build de cada stack) são publicadas.
  appImageRegistry: registry.registry.svc.cluster.local:5000/apps

  # ServiceAccount usada pelo PipelineRun, criada no namespace proj-* pelo chart
  # tekton-project (Épico 5 — ainda não migrado, ver yaml/projects/).
  pipelineRunnerServiceAccount: pipeline-runner

  workspace:
    storageSize: 2Gi

  # Uma entrada por stack (HLM-17). Adicionar uma stack aqui cria o Pipeline
  # correspondente e regenera o CEL do Trigger (filter + overlay pipeline-name,
  # HLM-19) — sem precisar tocar em nenhum template.
  stacks:
    - name: java-app
      repoPrefix: "backend-"
      buildTask:
        name: maven-build
        tag: v1
      pipelineParams: []
      buildTaskParams: []
    - name: node-app
      repoPrefix: "frontend-"
      buildTask:
        name: node-build
        tag: v1
      pipelineParams:
        - name: node-version
          default: "20"
      buildTaskParams:
        - name: node-version
          value: "$(params.node-version)"
        - name: install-command
          value: "npm install"

eventListener:
  name: gitlab-listener
  serviceName: el-gitlab-listener-np
  port: 8080
  nodePort: 32080

helmTest:
  # Projeto fake usado só pelo `helm test` (HLM-21) — precisa começar com um dos
  # `repoPrefix` de platform.stacks para passar no filtro CEL do Trigger.
  smokeProjectName: backend-smoketest
  # HLM-31 — Pod de teste, um curl e sai.
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 32Mi

# Épico 6 (Sprint 7): exposição NodePort do Tekton Dashboard (HLM-27, HLM-28).
# O Dashboard em si não é gerenciado por este chart — é instalado à parte
# (scripts/setup/01-install-tekton.sh, ver ADR-01 em docs/roadmap-helm.md).
# Este chart só cria o Service NodePort, replicando docs/01-infraestrutura-base.md
# §12 Opção 2. HLM-27 tinha ficado de fora do Sprint 3 original — feita aqui como
# pré-requisito de HLM-28.
dashboard:
  enabled: true
  namespace: tekton-pipelines
  serviceName: tekton-dashboard-np
  port: 9097
  nodePort: 32097
