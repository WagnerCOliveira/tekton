apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secretName }}
  namespace: {{ include "tekton-project.namespace" . }}
  annotations:
    tekton.dev/git-0: {{ .Values.project.gitlabURL }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ required "project.gitlabUser é obrigatório" .Values.project.gitlabUser | quote }}
  password: {{ required "project.gitlabPAT é obrigatório — PAT do GitLab (scope read_repository), nunca commitado em values.yaml versionado" .Values.project.gitlabPAT | quote }}
