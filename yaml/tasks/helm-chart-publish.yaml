apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: helm-chart-publish
spec:
  description: >-
    Empacota um chart Helm (helm package) e publica como artefato OCI no
    registry interno (helm push --plain-http — o registry é HTTP, ver
    ADR-005). Usado pelo Pipeline publish-helm-charts-pipeline (HLM-35,
    Épico 8/Sprint 8 do roadmap Helm).
  params:
  - name: chart-path
    type: string
    description: Caminho do chart dentro do repo clonado, ex. charts/tekton-registry
  - name: registry
    type: string
    default: registry.registry.svc.cluster.local:5000
  - name: repository
    type: string
    default: charts
  workspaces:
  - name: source
  steps:
  - name: package-and-push
    image: alpine/helm:3.14.4
    workingDir: $(workspaces.source.path)
    script: |
      #!/bin/sh
      set -eu
      mkdir -p /tmp/chart-out
      helm package "$(params.chart-path)" -d /tmp/chart-out
      TGZ=$(ls /tmp/chart-out/*.tgz)
      echo "== Publicando $TGZ em oci://$(params.registry)/$(params.repository) =="
      helm push "$TGZ" "oci://$(params.registry)/$(params.repository)" --plain-http
