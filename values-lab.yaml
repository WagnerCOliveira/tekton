# values-lab.yaml — valores default do laboratório para releases de
# charts/tekton-project via helmfile.yaml (Épico 5, Sprint 6 — HLM-24).
#
# Compartilhado entre TODOS os projetos: username e URL do GitLab do lab.
# O que NÃO entra aqui (varia por projeto ou é secreto) é passado no bloco
